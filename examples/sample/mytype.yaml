# Basic RemoteCluster — decrypts kubeconfig and creates a Secret
apiVersion: kubeconfig.stuttgart-things.com/v1alpha1
kind: RemoteCluster
metadata:
  name: test-cluster
spec:
  forProvider:
    source:
      path: testdata/kubeconfig.enc.yaml
    secretNamespace: crossplane-system
  providerConfigRef:
    name: default
    kind: ClusterProviderConfig
