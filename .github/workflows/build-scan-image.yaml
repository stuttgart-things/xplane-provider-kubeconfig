---
name: Build, Push & Scan Container Image
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-scan:
    name: Build, Push to ttl.sh & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Set build metadata
        id: meta
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "ttl_repo=ttl.sh/stuttgart-things/provider-kubeconfig" >> $GITHUB_OUTPUT

      - name: Build & push to ttl.sh
        uses: dagger/dagger-for-github@v8.4.0
        with:
          module: github.com/stuttgart-things/blueprints/kubernetes-microservice@v1.71.0
          call: >-
            bake-image
            --src .
            --repository-name stuttgart-things/provider-kubeconfig
            --tag ${{ steps.meta.outputs.commit }}
            --registry-url ttl.sh
            --dockerfile cluster/images/provider-kubeconfig/Dockerfile
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Scan image
        uses: dagger/dagger-for-github@v8.4.0
        with:
          module: github.com/stuttgart-things/blueprints/kubernetes-microservice@v1.71.0
          call: >-
            scan-image
            --image-ref ${{ steps.meta.outputs.ttl_repo }}:${{ steps.meta.outputs.commit }}
            --severity HIGH,CRITICAL
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
