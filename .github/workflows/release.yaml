---
name: Release
on:
  workflow_run:
    workflows: ["Build, Push & Scan Container Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Build, Push Image & xpkg to GHCR
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Set build metadata
        id: meta
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # --- Container image ---

      - name: Build & push image to ghcr.io (commit tag)
        uses: dagger/dagger-for-github@v6
        with:
          version: "0.20.0"
          verb: call
          module: github.com/stuttgart-things/blueprints/kubernetes-microservice@v1.71.0
          args: >-
            bake-image
            --src .
            --repository-name stuttgart-things/provider-kubeconfig
            --tag ${{ steps.meta.outputs.commit }}
            --registry-url ghcr.io
            --registry-username env:GITHUB_ACTOR
            --registry-password env:GITHUB_TOKEN
            --dockerfile cluster/images/provider-kubeconfig/Dockerfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Build & push image to ghcr.io (latest tag)
        uses: dagger/dagger-for-github@v6
        with:
          version: "0.20.0"
          verb: call
          module: github.com/stuttgart-things/blueprints/kubernetes-microservice@v1.71.0
          args: >-
            bake-image
            --src .
            --repository-name stuttgart-things/provider-kubeconfig
            --tag latest
            --registry-url ghcr.io
            --registry-username env:GITHUB_ACTOR
            --registry-password env:GITHUB_TOKEN
            --dockerfile cluster/images/provider-kubeconfig/Dockerfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      # --- Crossplane xpkg ---

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Install Crossplane CLI
        run: |
          curl -fsSL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/

      - name: Build xpkg
        run: |
          crossplane xpkg build \
            --package-root=package \
            --embed-runtime-image=ghcr.io/stuttgart-things/provider-kubeconfig:${{ steps.meta.outputs.commit }} \
            -o provider-kubeconfig.xpkg

      - name: Push xpkg (commit tag)
        run: |
          crossplane xpkg push \
            "ghcr.io/stuttgart-things/provider-kubeconfig-xpkg:${{ steps.meta.outputs.commit }}" \
            -f provider-kubeconfig.xpkg

      - name: Push xpkg (latest tag)
        run: |
          crossplane xpkg push \
            "ghcr.io/stuttgart-things/provider-kubeconfig-xpkg:latest" \
            -f provider-kubeconfig.xpkg
