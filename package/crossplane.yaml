apiVersion: meta.pkg.crossplane.io/v1alpha1
kind: Provider
metadata:
  name: provider-kubeconfig
  annotations:
    meta.crossplane.io/maintainer: Crossplane Maintainers <info@crossplane.io>
    meta.crossplane.io/source: github.com/stuttgart-things/provider-kubeconfig
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Manages remote Kubernetes kubeconfigs from SOPS-encrypted Git repositories.
      Decrypts kubeconfigs, creates Secrets, and bootstraps downstream ProviderConfigs.
spec:
  capabilities:
    - safe-start
  permissions:
    rules:
      # Downstream ProviderConfigs — v1 (cluster-scoped)
      - apiGroups: ["kubernetes.crossplane.io"]
        resources: ["providerconfigs"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - apiGroups: ["helm.crossplane.io"]
        resources: ["providerconfigs"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      # Downstream ProviderConfigs — v2 (namespaced)
      - apiGroups: ["kubernetes.m.crossplane.io"]
        resources: ["providerconfigs"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - apiGroups: ["helm.m.crossplane.io"]
        resources: ["providerconfigs"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
