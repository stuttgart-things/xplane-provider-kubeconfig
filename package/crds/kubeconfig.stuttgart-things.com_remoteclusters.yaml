            properties:
              atProvider:
                description: RemoteClusterObservation are the observable fields of
                  a RemoteCluster.
                properties:
                  apiEndpoint:
                    description: APIEndpoint is the API server endpoint of the remote
                      cluster.
                    type: string
                  clusterName:
                    description: ClusterName is the name of the remote cluster.
                    type: string
                  clusterType:
                    description: ClusterType is the detected Kubernetes distribution
                      (kind, k3s, rke2, k8s).
                    type: string
                  internalNetworkKey:
                    description: |-
                      InternalNetworkKey is the first 3 octets of the node InternalIP network
                      (e.g. "10.31.102" or "172.18.0"), used as network key for IP reservations.
                    type: string
                  kindClusterName:
                    description: |-
                      KindClusterName is the actual kind cluster name extracted from node names
                      (e.g. "dev" from "dev-control-plane"). Only set for kind clusters.
                    type: string
                  nodeCIDRs:
                    description: NodeCIDRs contains the CIDRs assigned to each node.
                    items:
                      type: string
                    type: array
                  nodeCount:
                    description: NodeCount is the number of nodes in the remote cluster.
                    type: integer
                  podCIDR:
                    description: PodCIDR is the pod network CIDR of the remote cluster.
                    type: string
                  secretRef:
                    description: SecretRef is the name of the Secret containing the
                      decrypted kubeconfig.
                    type: string
                  serverVersion:
                    description: ServerVersion is the Kubernetes version of the remote
                      cluster.
                    type: string
                  serviceCIDR:
                    description: ServiceCIDR is the service network CIDR of the remote
                      cluster.
                    type: string
                  vaultSecretVersion:
